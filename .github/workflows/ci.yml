name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile sources
        run: python -m compileall main.py src scripts

      - name: Check CLI help
        run: |
          python main.py --help
          python -m src.small_scale_experiment --help